[phases.setup]
nixPkgs = ["..#php83", "..#php83Extensions.pdo_mysql", "..#nodejs_20"]

[phases.install]
cmds = [
  "mkdir -p /etc/php83/conf.d && echo 'extension=pdo_mysql.so' > /etc/php83/conf.d/pdo_mysql.ini || true",
  "composer install --no-dev --optimize-autoloader",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
  "php artisan migrate --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
